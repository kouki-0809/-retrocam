<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroCam - レトロカメラ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 隠しビデオ要素（カメラ映像の入力用） -->
        <video id="video-stream" autoplay playsinline muted style="position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;"></video>

        <!-- メインのカメラビューファインダー -->
        <div class="viewfinder">
            <canvas id="camera-canvas"></canvas>
            
            <!-- ビューファインダー上のUI -->
            <div class="ui-overlay">
                <div class="recording-indicator">
                    <span class="red-dot"></span> <span id="current-time-display">00:00</span>
                </div>
                <div class="crosshair">
                    <div class="ch-h"></div>
                    <div class="ch-v"></div>
                </div>
                <div class="battery-indicator">
                    <div class="battery-body"><div class="battery-level"></div></div>
                    <div class="battery-tip"></div>
                </div>
            </div>
            
            <!-- シャッターフラッシュ効果用 -->
            <div id="flash-effect" class="flash"></div>
        </div>

        <!-- コントロールパネル -->
        <div class="controls">
            <div class="left-controls">
                <!-- ギャラリーへのプレビューボタン -->
                <button id="gallery-preview-btn" class="icon-btn">
                    <img id="gallery-thumb" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' fill='none'><rect width='100' height='100' fill='%23333'/></svg>" alt="Gallery">
                </button>
            </div>
            <div class="center-controls">
                <!-- シャッターボタン -->
                <button id="shutter-btn" class="shutter-btn">
                    <div class="shutter-inner"></div>
                </button>
            </div>
            <div class="right-controls">
                <!-- カメラ切り替え（前後）ボタン -->
                <button id="switch-camera-btn" class="icon-btn switch-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2v6h-6"></path>
                        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                        <path d="M3 22v-6h6"></path>
                        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- ギャラリーモーダル -->
        <div id="gallery-modal" class="modal hidden">
            <div class="modal-header">
                <h2>Photos</h2>
                <button id="close-gallery-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="empty-gallery-msg">まだ写真がありません</p>
                <div id="gallery-grid" class="gallery-grid"></div>
            </div>
        </div>

        <!-- 単一写真表示モーダル -->
        <div id="photo-modal" class="modal hidden">
            <div class="modal-header">
                <h2>Preview</h2>
                <button id="close-photo-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body photo-preview-body">
                <img id="photo-preview-img" src="" alt="Preview">
                <button id="download-photo-btn" class="action-btn">保存する (Save)</button>
                <button id="delete-photo-btn" class="action-btn danger">削除 (Delete)</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
